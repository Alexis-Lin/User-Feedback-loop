<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>General 问题反馈原型 · ATOM</title>
<style>
:root{
  --ink:#111214; --ink2:#6b6b70; --ink3:#7c7c83;
  --line:#e5e5ea; --sep:#ececf0; --bg:#f2f2f7; --card:#fff;
  --lime:#c6f24e; --sel:#f4f7e6; --selbd:#cfe07f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);}
.stage{display:flex;gap:26px;align-items:flex-start;justify-content:center;min-height:100vh;padding:28px 20px;flex-wrap:wrap;}
.side{width:214px;flex:none;padding-top:8px;}
.side h1{font-size:15px;margin:0 0 6px;}
.side p{font-size:13px;color:var(--ink2);line-height:1.6;margin:0 0 12px;}
.dl{font-size:12px;color:var(--ink3);display:block;margin-bottom:4px;}
.drow{display:flex;gap:6px;margin-bottom:10px;}
.side .btn{font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;cursor:pointer;display:block;width:100%;margin-bottom:8px;text-align:left;}
.drow .btn{flex:1;margin-bottom:0;text-align:center;}
.side .btn.on{background:var(--sel);border-color:var(--selbd);}
@media(max-height:930px){.phone{zoom:.86;}}
@media(max-height:800px){.phone{zoom:.76;}}

.phone{position:relative;width:402px;height:840px;background:#000;border-radius:56px;padding:11px;flex:none;box-shadow:0 10px 40px rgba(0,0,0,.16);}
.screen{position:relative;width:100%;height:100%;background:#fff;border-radius:46px;overflow:hidden;display:flex;flex-direction:column;}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#000;border-radius:999px;z-index:30;}
.sb{display:flex;justify-content:space-between;padding:16px 30px 4px;font-size:15px;font-weight:600;flex:none;}
.batt{display:inline-block;width:26px;height:13px;border:1px solid rgba(0,0,0,.5);border-radius:4px;position:relative;vertical-align:-2px;margin-left:4px;}
.batt::after{content:"";position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:17px;background:#111;border-radius:2px;}
.nav{display:flex;align-items:center;padding:8px 18px 10px;flex:none;}
.nav .bk{font-size:24px;cursor:pointer;width:30px;}
.nav .ttl{flex:1;text-align:center;font-size:17px;font-weight:600;}
.nav .rt{width:30px;}

.body{flex:1;overflow-y:auto;padding:6px 22px 24px;}
.view.hidden{display:none;}
.view{animation:in .24s ease;}
@keyframes in{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:none;}}

.intro{font-size:15px;color:var(--ink2);line-height:1.5;margin:4px 2px 18px;}
.sect{font-size:15px;font-weight:600;margin:0 0 12px;}
.sect .o{font-size:13px;font-weight:400;color:var(--ink3);}

.menu{display:flex;flex-direction:column;gap:10px;}
.mrow{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;background:#fff;}
.mi{width:26px;height:26px;flex:none;color:var(--ink2);margin-right:13px;display:flex;align-items:center;justify-content:center;}
.mi svg{width:23px;height:23px;}
.mtx{flex:1;min-width:0;}
.mrow .t{font-size:16px;}
.mrow .s{font-size:13px;color:var(--ink3);margin-top:2px;}
.mrow .arw{font-size:20px;color:#c4c4c9;flex:none;}

.csblock{margin-top:24px;text-align:center;}
.cstext{font-size:13px;color:var(--ink3);margin-bottom:5px;}
.cslinks{font-size:13px;color:var(--ink3);}
.cslinks a{color:#2a7d46;text-decoration:none;font-weight:500;cursor:pointer;}
#naEntry{margin-top:12px;}
#naEntry.hidden{display:none;}

.checks{display:flex;flex-direction:column;}
.chk{display:flex;align-items:center;gap:11px;padding:11px 2px;cursor:pointer;}
.cb{width:22px;height:22px;border:2px solid #c9c9ce;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;font-weight:700;}
.chk.on .cb{background:var(--ink);border-color:var(--ink);color:#fff;}
.chk .rt{font-size:16px;}

.lab{font-size:15px;font-weight:600;margin:20px 0 9px;}
.lab .o{font-size:13px;font-weight:400;color:var(--ink3);}
.help{font-size:13px;color:var(--ink3);margin:8px 2px 0;line-height:1.5;}
.cnt{font-size:12px;color:var(--ink3);text-align:right;margin-top:6px;}
.fld{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 14px;}
.fld input,.fld textarea{width:100%;border:0;outline:0;font-family:inherit;font-size:16px;color:var(--ink);background:transparent;resize:none;}
.fld textarea{min-height:24px;max-height:132px;overflow-y:auto;line-height:1.5;padding:0;margin:0;display:block;}
.fld input::placeholder,.fld textarea::placeholder{color:var(--ink3);}
.fieldmic{display:flex;align-items:flex-end;gap:10px;}
.micbtn{width:36px;height:36px;border-radius:999px;background:#eef3d6;color:#556417;border:0;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;font-size:17px;}
.recbar{display:none;align-items:center;gap:10px;border:1px solid #e5342f;background:#fdeceb;border-radius:14px;padding:11px 14px;margin-top:10px;}
.rdot{width:11px;height:11px;border-radius:999px;background:#e5342f;animation:pulse 1s infinite;}
@keyframes pulse{50%{opacity:.35;}}
.rtime{font-size:16px;color:#9a2422;font-variant-numeric:tabular-nums;}
.rcap{font-size:13px;color:#9a2422;opacity:.8;flex:1;}
.stopbtn{border:0;background:#e5342f;color:#fff;font-family:inherit;font-size:14px;border-radius:999px;padding:7px 16px;cursor:pointer;}
.clip{display:none;align-items:center;gap:8px;margin-top:10px;background:#f2f4e6;border:1px solid #e0e7bf;color:#54631a;border-radius:999px;padding:8px 12px 8px 14px;font-size:14px;width:max-content;}
.clipx{cursor:pointer;color:#8a985a;padding:0 2px;}

.shots{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.shot,.addshot{width:60px;height:60px;border-radius:10px;flex:none;}
.addshot{border:1.5px dashed #cfcfd4;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:20px;cursor:pointer;background:#fafafb;}
.shotcap{font-size:13px;color:var(--ink3);}
.shot{background:#dcdce0;position:relative;}
.shot span{position:absolute;top:-6px;right:-6px;width:19px;height:19px;border-radius:999px;background:#141414;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.ctype{display:flex;gap:8px;margin-bottom:10px;}
.tchip{border:1.5px solid var(--line);border-radius:999px;padding:6px 15px;font-size:14px;cursor:pointer;background:#fff;color:var(--ink2);}
.tchip.on{background:var(--sel);border-color:var(--selbd);color:var(--ink);}
.wecom{display:flex;align-items:center;gap:12px;margin-top:14px;background:#eef6e6;border:1px solid #d5e8c4;border-radius:14px;padding:12px 14px;cursor:pointer;}
.wecom-ic{width:38px;height:38px;border-radius:10px;background:#2aae67;color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;flex:none;}
.wecom-tx{flex:1;}
.wecom-tx .t{font-size:15px;color:#1f5c38;font-weight:600;}
.wecom-tx .s{font-size:12px;color:#3c7a52;margin-top:2px;line-height:1.4;}
.wecom-qr{width:38px;height:38px;flex:none;border:1px solid #d5e8c4;border-radius:6px;overflow:hidden;background:#fff;}
.wecom-big{display:none;flex-direction:column;align-items:center;gap:10px;margin-top:12px;background:#f6f9f2;border:1px solid #e0ecd3;border-radius:14px;padding:18px;}
.wecom-big.on{display:flex;}
.wecom-big .qr{border:1px solid #e0ecd3;border-radius:8px;overflow:hidden;}
.qh{font-size:13px;color:#3c7a52;}
.devnote{display:flex;gap:8px;font-size:12px;color:var(--ink3);margin-top:20px;background:#f6f6f8;border-radius:10px;padding:10px 12px;line-height:1.5;}

.hero{display:flex;gap:14px;align-items:flex-start;margin:8px 0 4px;}
.heroic{width:56px;height:52px;flex:none;background:var(--lime);border-radius:14px 14px 14px 3px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.hero h2{font-size:20px;margin:0 0 4px;}
.hero p{font-size:14px;color:var(--ink2);margin:0;line-height:1.5;}

.foot{flex:none;padding:12px 22px calc(12px + env(safe-area-inset-bottom,20px));border-top:1px solid var(--sep);background:#fff;}
.foot.hidden{display:none;}
.cta{height:52px;width:100%;border:0;border-radius:999px;background:var(--ink);color:#fff;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;}
.cta:disabled{background:#dcdce0;color:#9a9aa0;cursor:not-allowed;}

.thanks{padding:70px 30px;text-align:center;}
.tkic{width:76px;height:76px;border-radius:999px;background:var(--lime);color:#1c2b06;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 20px;}
.thanks h2{font-size:22px;margin:0 0 8px;}
.thanks p{font-size:14px;color:var(--ink2);margin:0 0 34px;line-height:1.5;}
.satlab{font-size:15px;font-weight:600;margin-bottom:16px;}
.faces{display:flex;justify-content:center;gap:16px;margin-bottom:10px;}
.face{width:64px;height:64px;border-radius:16px;border:1.5px solid var(--line);background:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
.face.on{background:var(--sel);border-color:var(--selbd);transform:scale(1.06);}
.facecap{font-size:12px;color:var(--ink3);}
</style>
</head>
<body>
<div class="stage">
<div class="side">
  <h1>General 问题反馈</h1>
  <p>两步跳 · 图标 + 精简文案。语言(中/英) 与 版本(大陆/国际) 正交，两件事各自切换。</p>
  <span class="dl">语言 / Language</span>
  <div class="drow"><button class="btn on" id="lZh" onclick="setLang('zh')">中文</button><button class="btn" id="lEn" onclick="setLang('en')">EN</button></div>
  <span class="dl">版本 / Region</span>
  <div class="drow"><button class="btn on" id="rCn" onclick="applyRegion('cn')">大陆</button><button class="btn" id="rIntl" onclick="applyRegion('intl')">国际</button></div>
  <button class="btn" onclick="reset_()">重置 / Reset</button>
  <button class="btn" onclick="openNewAction()">↗ 新动作申请页（复用）</button>
</div>

<div class="phone"><div class="island"></div><div class="screen">
  <div class="sb"><span>10:59</span><span>LTE <span class="batt"></span></span></div>
  <div class="nav"><span class="bk" id="bk">‹</span><span class="ttl" id="ttl">问题反馈</span><span class="rt"></span></div>

  <div class="body" id="body">

    <!-- 一级：分类菜单 -->
    <div class="view" id="v1">
      <div class="intro" id="intro"></div>
      <div class="sect" id="prompt"></div>
      <div class="menu" id="menu"></div>
      <div class="csblock">
        <div class="cstext" id="csText"></div>
        <div class="cslinks"><span id="csMailLab"></span> <a href="mailto:cs@bodypark.fit">cs@bodypark.fit</a><span id="csWx"> · <a id="csWxLink"></a></span></div>
        <div class="wecom-big" id="csWxBig"><div class="qr" style="width:132px;height:132px"></div><div class="qh" id="csWxCap"></div></div>
      </div>
    </div>

    <!-- 二级：分类详情 -->
    <div class="view hidden" id="v2">
      <div class="sect" id="subsSect" style="margin-top:8px;"></div>
      <div class="checks" id="subs"></div>
      <div class="mrow hidden" id="naEntry"><span class="mi" id="naEntryIc"></span><div class="mtx"><div class="t" id="naEntryT"></div><div class="s" id="naEntryS"></div></div><span class="arw">›</span></div>

      <div class="lab" id="addLab"></div>
      <div class="fld">
        <div class="fieldmic">
          <textarea id="pText" maxlength="200" rows="1" oninput="grow(this);cnt()"></textarea>
          <button class="micbtn" onclick="rec.start()">🎙</button>
        </div>
        <div class="cnt" id="pCnt">0/200</div>
      </div>
      <div class="help" id="addHelp"></div>
      <div class="recbar" id="pRec"><span class="rdot"></span><span class="rtime" id="pTime">0:00</span><span class="rcap" id="recCap"></span><button class="stopbtn" id="stopBtn" onclick="rec.stop()"></button></div>
      <div class="clip" id="pClip">▷ <span id="voiceLab"></span> <span id="pClipT">0:00</span> <span class="clipx" onclick="rec.del()">✕</span></div>

      <div class="lab" id="shotLab"></div>
      <div class="shots" id="shots"><div class="addshot" onclick="addShot()">⊕</div><span class="shotcap" id="shotCap"></span></div>

      <div id="contactIntl">
        <div class="lab" id="contactIntlLab"></div>
        <div class="fld"><input id="mail" type="email"></div>
      </div>
      <div id="contactCn">
        <div class="lab" id="contactCnLab"></div>
        <div class="ctype" id="ctype">
          <span class="tchip on" data-ct="phone" id="ctPhone"></span>
          <span class="tchip" data-ct="wechat" id="ctWechat"></span>
          <span class="tchip" data-ct="email" id="ctEmail"></span>
        </div>
        <div class="fld"><input id="cnContact"></div>
        <div class="wecom" id="wecom">
          <div class="wecom-ic">企</div>
          <div class="wecom-tx"><div class="t" id="wecomT"></div><div class="s" id="wecomS"></div></div>
          <div class="wecom-qr"></div>
        </div>
        <div class="wecom-big" id="wecomBig"><div class="qr" style="width:150px;height:150px"></div><div class="qh" id="wecomCap"></div></div>
      </div>
      <div class="devnote" id="devnote"></div>
    </div>

    <!-- 二级：新动作申请 -->
    <div class="view hidden" id="v2n">
      <div class="hero"><div class="heroic">🏋</div><div><h2 id="naHeroT"></h2><p id="naHeroP"></p></div></div>
      <div class="lab" id="naNameLab"></div>
      <div class="fld"><input id="naName" oninput="gate()"></div>
      <div class="lab" id="naWhyLab"></div>
      <div class="fld"><textarea id="naWhy" maxlength="200" rows="1" oninput="grow(this)"></textarea></div>
      <div class="help" id="naWhyHelp"></div>
      <div class="lab" id="naRefLab"></div>
      <div class="fld"><input id="naRef"></div>
    </div>

    <!-- 感谢 + 满意度 -->
    <div class="view hidden" id="thanks">
      <div class="thanks">
        <div class="tkic">♥</div>
        <h2 id="tkTitle"></h2>
        <p id="tkSub"></p>
        <div class="satlab" id="satLab"></div>
        <div class="faces"><div class="face" onclick="pickFace(this)">😍</div><div class="face" onclick="pickFace(this)">🙂</div><div class="face" onclick="pickFace(this)">😕</div></div>
        <div class="facecap" id="satCap"></div>
      </div>
    </div>

  </div>

  <div class="foot" id="foot"><button class="cta" id="cta" onclick="submit_()"></button></div>
</div></div>
</div>

// ---------- 双语分类 ----------
const CATS={
  ai:{icon:'ai',name:{zh:'AI 识别准确性',en:'AI tracking'},sub:{zh:'计数 / 身体识别 / 讲解',en:'Count / pose / coaching'},

  content:{icon:'content',name:{zh:'课程内容',en:'Course content'},sub:{zh:'示范图文 / 名称 / 部位',en:'Media / name / muscle'},
    subs:{zh:['示范图文有误','动作名称有误','训练部位有误','动作讲解有误'],en:['Wrong media','Wrong name','Wrong muscle','Wrong description']}},
  connect:{icon:'connect',name:{zh:'连接数据与使用体验',en:'Device, data & UX'},sub:{zh:'连接 / 同步 / 卡顿 / 交互',en:'Connect / sync / lag / UX'},
    subs:{zh:['蓝牙配对','传感器','频繁掉线','记录丢失','多端不同步','卡顿闪退','交互不顺'],en:['Bluetooth pairing','Sensor','Keeps dropping','Records lost','Out of sync','Lag / crash','Clunky UX']}},
  otherfb:{icon:'otherfb',name:{zh:'其他问题反馈',en:'Other issue'},sub:{zh:'其他没归类的问题',en:'Anything else'},subs:{zh:[],en:[]},
    label:{zh:'说说你遇到的问题',en:'Tell us what happened'},placeholder:{zh:'说说你遇到的问题…',en:'Tell us what happened…'}},
  feature:{icon:'feature',name:{zh:'新功能建议',en:'Feature request'},sub:{zh:'希望我们增加或改进的功能',en:'What we could add or improve'},subs:{zh:[],en:[]},
    label:{zh:'说说你的建议',en:'Your suggestion'},placeholder:{zh:'说说你希望 ATOM 增加或改进什么…',en:'What could ATOM add or improve…'}},
};
const ORDER=['ai','content','connect','otherfb','feature'];

let lang='zh', region='cn', cur='v1', cat='', naFrom='';
function t(k){return L[lang][k];}
function cn(o){return o[lang];}

function renderMenu(){
  $('#menu').innerHTML = ORDER.map(k=>`<div class="mrow" data-k="${k}"><span class="mi">${ICONS[CATS[k].icon]}</span><div class="mtx"><div class="t">${cn(CATS[k].name)}</div><div class="s">${cn(CATS[k].sub)}</div></div><span class="arw">›</span></div>`).join('');
  document.querySelectorAll('#menu .mrow').forEach(r=>r.onclick=()=>openCat(r.dataset.k));
}
function setTitle(){$('#ttl').textContent = cur==='v2'&&cat ? cn(CATS[cat].name) : (cur==='v2n' ? t('naTitle') : t('title'));}

function openCat(k){
  cat=k;
  var C=CATS[k], subsArr=cn(C.subs), isOther=subsArr.length===0;
  $('#subsSect').innerHTML = t('specific')+' <span class="o">'+t('multi')+'</span>';
  $('#subsSect').style.display = isOther?'none':'';
  $('#subs').innerHTML = subsArr.map(s=>`<div class="chk"><span class="cb">✓</span><span class="rt">${s}</span></div>`).join('');
  document.querySelectorAll('#subs .chk').forEach(c=>c.onclick=()=>c.classList.toggle('on'));
  $('#naEntry').classList.toggle('hidden', k!=='content');
  $('#addLab').innerHTML = (isOther?cn(C.label):t('addDefault'))+' <span class="o">'+t('optional')+'</span>';
  $('#pText').placeholder = isOther?cn(C.placeholder):t('ph_add');
  $('#addHelp').textContent = isOther?t('addHelpFree'):t('addHelp');
  $('#pText').value='';grow($('#pText'));cnt();rec.del();$('#pRec').style.display='none';
  showView('v2');
}

function showView(id){
  ['v1','v2','v2n','thanks'].forEach(v=>$('#'+v).classList.toggle('hidden',v!==id));
  const el=$('#'+id);el.style.animation='none';el.offsetHeight;el.style.animation='';
  cur=id;setTitle();
  $('#bk').style.visibility = (id==='v2'||id==='v2n') ? 'visible' : 'hidden';
  $('#foot').classList.toggle('hidden', id==='v1'||id==='thanks');
  if(id==='v2'){$('#cta').textContent=t('submit');$('#cta').disabled=false;}
  if(id==='v2n'){$('#cta').textContent=t('submitReq');gate();}
  $('#body').scrollTop=0;
}
$('#bk').onclick=()=>{ if(cur==='v2n')showView(naFrom==='content'?'v2':'v1'); else if(cur==='v2')showView('v1'); };
function gate(){ if(cur==='v2n')$('#cta').disabled=$('#naName').value.trim()===''; }
document.getElementById('naEntry').onclick=()=>{naFrom='content';$('#naName').value='';showView('v2n');};
function openNewAction(){naFrom='';$('#naName').value='';showView('v2n');}

function submit_(){
  $('#tkSub').textContent = cur==='v2n' ? t('tkSubReq') : (cat==='feature' ? t('tkSubFeat') : t('tkSub'));
  showView('thanks');
}
function pickFace(el){document.querySelectorAll('.face').forEach(f=>f.classList.remove('on'));el.classList.add('on');}
function grow(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight,132)+'px';}
function cnt(){$('#pCnt').textContent=$('#pText').value.length+'/200';}

// 录音（模拟）
var rec={t:null,sec:0,
  start(){$('#pRec').style.display='flex';this.sec=0;$('#pTime').textContent='0:00';
    this.t=setInterval(()=>{this.sec++;$('#pTime').textContent=fmt(this.sec);if(this.sec>=60)rec.stop();},1000);},
  stop(){clearInterval(this.t);$('#pRec').style.display='none';
    if(this.sec>0){$('#pClip').style.display='inline-flex';$('#pClipT').textContent=fmt(this.sec);}},
  del(){$('#pClip').style.display='none';}
};
function fmt(s){return (s/60|0)+':'+(s%60).toString().padStart(2,'0');}
function addShot(){
  const b=$('#shots');if(b.querySelectorAll('.shot').length>=3)return;
  const d=document.createElement('div');d.className='shot';d.innerHTML='<span>✕</span>';
  d.querySelector('span').onclick=()=>d.remove();b.insertBefore(d,b.querySelector('.addshot'));
}

// ---------- 语言 ----------
function setLang(l){lang=l;$('#lZh').classList.toggle('on',l==='zh');$('#lEn').classList.toggle('on',l==='en');applyLang();}
function applyLang(){
  document.documentElement.lang=lang;
  renderMenu();setTitle();
  $('#intro').textContent=t('intro');$('#prompt').textContent=t('prompt');
  $('#csText').textContent=t('csText');$('#csMailLab').textContent=t('csMail');$('#csWxLink').textContent=t('csWx');$('#csWxCap').textContent=t('csWxCap');
  $('#naEntryIc').innerHTML=ICONS.dumbbell;$('#naEntryT').textContent=t('naEntryT');$('#naEntryS').textContent=t('naEntryS');
  $('#shotLab').innerHTML=t('shots')+' <span class="o">'+t('optional')+'</span>';$('#shotCap').textContent=t('shotsCap');
  $('#contactIntlLab').innerHTML=t('contactIntl')+' <span class="o">'+t('optional')+'</span>';$('#mail').placeholder=t('ph_mail');
  $('#contactCnLab').innerHTML=t('contactCn')+' <span class="o">'+t('optional')+'</span>';
  $('#ctPhone').textContent=t('ctPhone');$('#ctWechat').textContent=t('ctWechat');$('#ctEmail').textContent=t('ctEmail');
  var on=$('#ctype .tchip.on'); $('#cnContact').placeholder = t('ph_'+(on?on.dataset.ct:'phone'));
  $('#wecomT').textContent=t('wecomT');$('#wecomS').textContent=t('wecomS');$('#wecomCap').textContent=t('wecomCap');
  $('#devnote').textContent=t('devnote');$('#recCap').textContent=t('recCap');$('#stopBtn').textContent=t('recStop');$('#voiceLab').textContent=t('voice');
  $('#naHeroT').textContent=t('naHeroT');$('#naHeroP').textContent=t('naHeroP');$('#naNameLab').textContent=t('naName');
  $('#naWhyLab').innerHTML=t('naWhy')+' <span class="o">'+t('optional')+'</span>';$('#naWhyHelp').textContent=t('naWhyHelp');
  $('#naRefLab').innerHTML=t('naRef')+' <span class="o">'+t('optional')+'</span>';
  $('#naName').placeholder=t('ph_naName');$('#naWhy').placeholder=t('ph_naWhy');$('#naRef').placeholder=t('ph_naRef');
  $('#tkTitle').textContent=t('tkTitle');$('#satLab').textContent=t('satLab');$('#satCap').textContent=t('satCap');
  if(cur==='v2'){$('#cta').textContent=t('submit');} if(cur==='v2n'){$('#cta').textContent=t('submitReq');}
  // 若正处于二级，就地刷新子项/标签，保留已选与已填
  if(cur==='v2'&&cat){
    var C=CATS[cat],subsArr=cn(C.subs),isOther=subsArr.length===0;
    $('#subsSect').innerHTML=t('specific')+' <span class="o">'+t('multi')+'</span>';
    document.querySelectorAll('#subs .chk .rt').forEach((el,i)=>{if(subsArr[i])el.textContent=subsArr[i];});
    $('#addLab').innerHTML=(isOther?cn(C.label):t('addDefault'))+' <span class="o">'+t('optional')+'</span>';
    if(!$('#pText').value)$('#pText').placeholder=isOther?cn(C.placeholder):t('ph_add');
    $('#addHelp').textContent=isOther?t('addHelpFree'):t('addHelp');
  }
}

// ---------- 版本 ----------
function applyRegion(r){
  region=r;
  $('#contactCn').style.display=r==='cn'?'':'none';
  $('#contactIntl').style.display=r==='intl'?'':'none';
  $('#rCn').classList.toggle('on',r==='cn');$('#rIntl').classList.toggle('on',r==='intl');
  $('#csWx').style.display=r==='cn'?'':'none';
}
document.querySelectorAll('#ctype .tchip').forEach(c=>{
  c.onclick=()=>{document.querySelectorAll('#ctype .tchip').forEach(x=>x.classList.remove('on'));c.classList.add('on');
    $('#cnContact').placeholder=t('ph_'+c.dataset.ct);};
});
$('#wecom').onclick=()=>$('#wecomBig').classList.toggle('on');

document.querySelectorAll('.wecom-qr').forEach(e=>e.innerHTML=QR);
document.querySelectorAll('.qr').forEach(e=>e.innerHTML=QR);
$('#csWxLink').onclick=()=>$('#csWxBig').classList.toggle('on');

function reset_(){location.reload();}
applyLang();applyRegion('cn');showView('v1');
</script>
</body>
